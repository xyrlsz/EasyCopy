name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string
      prerelease:
        description: "Mark this GitHub Release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-android-release:
    runs-on: ubuntu-latest
    env:
      FLUTTER_VERSION: "3.38.7"
      JAVA_VERSION: "17"
      PUB_CACHE: ${{ github.workspace }}/.pub-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            release_tag="${{ github.event.inputs.tag }}"
            prerelease_flag="${{ github.event.inputs.prerelease }}"
          else
            release_tag="${{ github.ref_name }}"
            prerelease_flag="false"
          fi

          version_line="$(sed -nE 's/^version:[[:space:]]+(.+)$/\1/p' pubspec.yaml | head -n1)"
          if [[ -z "$version_line" ]]; then
            echo "Could not read version from pubspec.yaml." >&2
            exit 1
          fi

          app_version="${version_line%%+*}"
          build_number="${version_line##*+}"
          expected_tag="v${app_version}"
          notes_path=".github/release-notes/${release_tag}.md"

          if [[ "$release_tag" != "$expected_tag" ]]; then
            echo "Tag ${release_tag} does not match pubspec version ${app_version}. Expected ${expected_tag}." >&2
            exit 1
          fi

          if [[ -f "$notes_path" ]]; then
            echo "has_custom_notes=true" >> "$GITHUB_OUTPUT"
            echo "release_notes_path=$notes_path" >> "$GITHUB_OUTPUT"
          else
            echo "has_custom_notes=false" >> "$GITHUB_OUTPUT"
            echo "release_notes_path=" >> "$GITHUB_OUTPUT"
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_title=EasyCopy $app_version" >> "$GITHUB_OUTPUT"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease_flag" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Analyze
        run: flutter analyze

      - name: Validate signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          for name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_STORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD
          do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      - name: Decode Android keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks

      - name: Build signed APKs (armeabi-v7a, arm64-v8a, x86_64)
        shell: bash
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/upload-keystore.jks
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          flutter build apk \
            --release \
            --target-platform=android-arm,android-arm64,android-x64 \
            --split-per-abi \
            --tree-shake-icons

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          version="${{ steps.meta.outputs.app_version }}"
          apk_outputs=(
            "armeabi-v7a build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk"
            "arm64-v8a build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
            "x86_64 build/app/outputs/flutter-apk/app-x86_64-release.apk"
          )

          for spec in "${apk_outputs[@]}"; do
            abi="${spec%% *}"
            source="${spec#* }"

            if [[ ! -f "$source" ]]; then
              echo "APK not found: $source" >&2
              exit 1
            fi

            cp "$source" "dist/EasyCopy-${version}-android-${abi}.apk"
          done

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EasyCopy-${{ steps.meta.outputs.release_tag }}-android-release
          path: dist/*
          if-no-files-found: error

      - name: Create or update GitHub Release with custom notes
        if: steps.meta.outputs.has_custom_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: ${{ steps.meta.outputs.release_title }}
          target_commitish: ${{ github.sha }}
          body_path: ${{ steps.meta.outputs.release_notes_path }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          files: |
            dist/*.apk
          fail_on_unmatched_files: true

      - name: Create or update GitHub Release
        if: steps.meta.outputs.has_custom_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: ${{ steps.meta.outputs.release_title }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          files: |
            dist/*.apk
          fail_on_unmatched_files: true
