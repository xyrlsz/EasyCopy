name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string
      prerelease:
        description: "Mark this GitHub Release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-android-release:
    runs-on: windows-latest
    env:
      FLUTTER_VERSION: "3.38.7"
      JAVA_VERSION: "17"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $releaseTag = "${{ github.event.inputs.tag }}"
            $prereleaseFlag = "${{ github.event.inputs.prerelease }}"
          } else {
            $releaseTag = "${{ github.ref_name }}"
            $prereleaseFlag = "false"
          }

          $versionLine = (Select-String -Path pubspec.yaml -Pattern '^version:\s+(.+)$').Matches[0].Groups[1].Value.Trim()
          if ([string]::IsNullOrWhiteSpace($versionLine)) {
            throw "Could not read version from pubspec.yaml."
          }

          $appVersion = $versionLine.Split('+')[0]
          $buildNumber = $versionLine.Split('+')[-1]
          $expectedTag = "v$appVersion"

          if ($releaseTag -ne $expectedTag) {
            throw "Tag $releaseTag does not match pubspec version $appVersion. Expected $expectedTag."
          }

          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "release_title=EasyCopy $appVersion" >> $env:GITHUB_OUTPUT
          "app_version=$appVersion" >> $env:GITHUB_OUTPUT
          "build_number=$buildNumber" >> $env:GITHUB_OUTPUT
          "prerelease=$prereleaseFlag" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Validate signing secrets
        shell: pwsh
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'

          foreach ($name in @(
            'ANDROID_KEYSTORE_BASE64',
            'ANDROID_STORE_PASSWORD',
            'ANDROID_KEY_ALIAS',
            'ANDROID_KEY_PASSWORD'
          )) {
            if ([string]::IsNullOrWhiteSpace((Get-Item "env:$name").Value)) {
              throw "Missing required secret: $name"
            }
          }

      - name: Decode Android keystore
        shell: pwsh
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          $ErrorActionPreference = 'Stop'
          [IO.File]::WriteAllBytes(
            "android/upload-keystore.jks",
            [Convert]::FromBase64String($env:ANDROID_KEYSTORE_BASE64)
          )

      - name: Build signed arm64-v8a APK
        shell: pwsh
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}\android\upload-keystore.jks
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'
          .\build_apk_arm64_v8a.ps1 -SymbolsDir "release_symbols\${{ steps.meta.outputs.app_version }}"

      - name: Prepare release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          New-Item -ItemType Directory -Path dist -Force | Out-Null

          $version = "${{ steps.meta.outputs.app_version }}"
          $apkSource = "build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
          $apkName = "EasyCopy-$version-android-arm64-v8a.apk"
          $apkTarget = Join-Path "dist" $apkName
          $symbolsTarget = Join-Path "dist" "EasyCopy-$version-android-arm64-v8a-symbols.zip"

          Copy-Item $apkSource $apkTarget -Force
          Compress-Archive -Path "release_symbols\$version\android-arm64-v8a" -DestinationPath $symbolsTarget -Force

          $apkHash = (Get-FileHash $apkTarget -Algorithm SHA256).Hash.ToLower()
          $symbolsHash = (Get-FileHash $symbolsTarget -Algorithm SHA256).Hash.ToLower()
          @(
            "$apkHash *$apkName"
            "$symbolsHash *$([IO.Path]::GetFileName($symbolsTarget))"
          ) | Set-Content -Path "dist/SHA256SUMS.txt"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EasyCopy-${{ steps.meta.outputs.release_tag }}-android-release
          path: dist/*
          if-no-files-found: error

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: ${{ steps.meta.outputs.release_title }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          files: |
            dist/*.apk
            dist/*.zip
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
