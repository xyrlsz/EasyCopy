name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string
      prerelease:
        description: "Mark this GitHub Release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-android-release:
    runs-on: ubuntu-latest
    env:
      FLUTTER_VERSION: "3.38.7"
      JAVA_VERSION: "17"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${{ github.event.inputs.tag }}"
            prerelease_flag="${{ github.event.inputs.prerelease }}"
          else
            release_tag="${GITHUB_REF_NAME}"
            prerelease_flag="false"
          fi

          version_line="$(grep -E '^version:' pubspec.yaml | head -n 1 | awk '{print $2}')"
          if [[ -z "${version_line}" ]]; then
            echo "::error::Could not read version from pubspec.yaml."
            exit 1
          fi

          app_version="${version_line%%+*}"
          build_number="${version_line##*+}"
          expected_tag="v${app_version}"

          if [[ "${release_tag}" != "${expected_tag}" ]]; then
            echo "::error::Tag ${release_tag} does not match pubspec version ${app_version}. Expected ${expected_tag}."
            exit 1
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_title=EasyCopy ${app_version}" >> "${GITHUB_OUTPUT}"
          echo "app_version=${app_version}" >> "${GITHUB_OUTPUT}"
          echo "build_number=${build_number}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease_flag}" >> "${GITHUB_OUTPUT}"
          echo "symbols_dir=release_symbols/${app_version}/android-arm64-v8a" >> "${GITHUB_OUTPUT}"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Validate signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          for name in ANDROID_KEYSTORE_BASE64 ANDROID_STORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required secret: ${name}"
              exit 1
            fi
          done

      - name: Decode Android keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/upload-keystore.jks

      - name: Build signed arm64-v8a APK
        shell: bash
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/upload-keystore.jks
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          flutter build apk \
            --release \
            --target-platform=android-arm64 \
            --split-per-abi \
            --tree-shake-icons \
            --split-debug-info="${{ steps.meta.outputs.symbols_dir }}"

      - name: Prepare release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          apk_source="build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
          apk_target="dist/EasyCopy-${{ steps.meta.outputs.app_version }}-android-arm64-v8a.apk"
          symbols_target="dist/EasyCopy-${{ steps.meta.outputs.app_version }}-android-arm64-v8a-symbols.zip"

          cp "${apk_source}" "${apk_target}"
          (
            cd "release_symbols/${{ steps.meta.outputs.app_version }}"
            zip -r "${GITHUB_WORKSPACE}/${symbols_target}" "android-arm64-v8a"
          )
          (
            cd dist
            sha256sum \
              "EasyCopy-${{ steps.meta.outputs.app_version }}-android-arm64-v8a.apk" \
              "EasyCopy-${{ steps.meta.outputs.app_version }}-android-arm64-v8a-symbols.zip" \
              > SHA256SUMS.txt
          )

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EasyCopy-${{ steps.meta.outputs.release_tag }}-android-release
          path: dist/*
          if-no-files-found: error

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.meta.outputs.release_title }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists."
          else
            if [[ "${PRERELEASE}" == "true" ]]; then
              gh release create "${RELEASE_TAG}" \
                --title "${RELEASE_TITLE}" \
                --target "${GITHUB_SHA}" \
                --generate-notes \
                --prerelease
            else
              gh release create "${RELEASE_TAG}" \
                --title "${RELEASE_TITLE}" \
                --target "${GITHUB_SHA}" \
                --generate-notes
            fi
          fi

          gh release upload "${RELEASE_TAG}" dist/* --clobber
